<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Download myParish App</title>
  <meta name="description" content="Download myParish for iPhone or Android" />
  <style>
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #100a1c; color: #fff; padding: 24px;
    }
    .card {
      width: min(420px, 100%); background: #1c1230; border-radius: 20px;
      padding: 28px 24px 32px; box-shadow: 0 20px 50px rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.08); text-align: center;
    }
    h1 { font-size: 1.45rem; margin: 0 0 8px; }
    p { margin: 0 0 22px; color: #c8c0d8; line-height: 1.45; font-size: 1rem; }
    a.btn {
      display: block; width: 100%; box-sizing: border-box; margin: 0 0 12px;
      padding: 15px 16px; border-radius: 12px; text-decoration: none;
      font-weight: 700; font-size: 1.05rem;
    }
    a.ios { background: #fff; color: #111; }
    a.android { background: #3ddc84; color: #063; }
    .note { margin-top: 8px; font-size: 0.85rem; color: #9a90b0; line-height: 1.4; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Download myParish</h1>
    <p>Choose your phone type. This opens the right app store.</p>
    <a class="btn ios" href="https://apps.apple.com/us/app/myparish-classic/id892066479">iPhone / iPad (App Store)</a>
    <a class="btn android" href="https://play.google.com/store/apps/details?id=com.michiganlabs.myparish">Android (Google Play)</a>
    <p class="note">On some Android phones you may then be asked Google Play or Samsung store — pick Google Play for myParish.</p>
  </div>
</body>
</html>
